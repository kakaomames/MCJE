<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>Minecraft WE - 実行拠点</title>
    <script src="https://cjrtnc.leaningtech.com/4.3/loader.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
  (async function () {
    await cheerpjInit();
    cheerpjCreateDisplay(800, 600);

    // 1. IndexedDBキャッシュエンジン
    async function getOrFetch(path) {
        // ここにIndexedDBから取得する処理（省略しているがイメージとして）
        // ない場合は fetch して IndexedDB に保存してから URL.createObjectURL を返す
        console.log("Checking cache for: " + path);
        const response = await fetch(path);
        const blob = await response.blob();
        return URL.createObjectURL(blob);
    }

    try {
        console.log("探検隊：キャッシュ・起動エンジン同時稼働！");

        // 2. 引数とライブラリリスト取得
        const args = (await (await fetch('/MCJE/b.txt')).text()).trim().split(/\s+/);
        const libLines = (await (await fetch('/MCJE/lib_url.txt')).text()).split('\n').filter(l => l.trim() !== "");

        // 3. キャッシュを活用してBlob化
        const mainJarUrl = await getOrFetch("/MCJE/release/26.2.jar");
        const libUrls = await Promise.all(libLines.map(line => 
            getOrFetch("/MCJE/lib/" + line.split('/').pop())
        ));

        // 4. クラスパス構築
        const classpath = [mainJarUrl, ...libUrls].join(':');

        // 5. 起動
        await cheerpjRunMain("net.minecraft.client.main.Main", classpath, ...args);
    } catch (err) {
        console.error("起動シーケンスで致命的なエラー:", err);
    }
  })();
</script>

</body>
</html>
