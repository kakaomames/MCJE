<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>Minecraft WE - 実行拠点</title>
    <script src="https://cjrtnc.leaningtech.com/4.3/loader.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
      (async function () {
        await cheerpjInit();
        cheerpjCreateDisplay(800, 600);

        // 補助関数：ファイルをロードしてBlob URLを返す
        async function getBlobUrl(path) {
          const response = await fetch(path);
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          const blob = await response.blob();
          return URL.createObjectURL(blob);
        }

        try {
            console.log("探検隊：全リソースのメモリ展開を開始...");

            // 1. 引数の読み込み
            const argResponse = await fetch('/MCJE/b.txt');
            const args = (await argResponse.text()).trim().split(/\s+/);

            // 2. ライブラリリストの読み込み
            const libResponse = await fetch('/MCJE/lib_url.txt');
            const libLines = (await libResponse.text()).split('\n').filter(l => l.trim() !== "");

            // 3. メインJARロード
            const mainJarUrl = await getBlobUrl("/MCJE/release/26.2.jar");
            
            // 4. ライブラリを直列ロード
            const libUrls = [];
            for (const line of libLines) {
                const filename = line.split('/').pop();
                console.log("Loading library: " + filename);
                const url = await getBlobUrl("/MCJE/lib/" + filename);
                libUrls.push(url);
            }

            // 5. クラスパス構築
            const classpath = [mainJarUrl, ...libUrls].join(':');

            console.log("メモリ展開完了！マイクラ起動シークエンスへ...");

            // 6. 起動
            await cheerpjRunMain(
              "net.minecraft.client.main.Main",
              classpath,
              ...args
            );
        } catch (err) {
            console.error("起動失敗: ", err);
        }
      })();
    </script>
</body>
</html>
