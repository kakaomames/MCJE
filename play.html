<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>Minecraft WE - 実行拠点</title>
    <script src="https://cjrtnc.leaningtech.com/4.3/loader.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game-container"></div>
<script>
  (async function () {
    await cheerpjInit();
    cheerpjCreateDisplay(800, 600);

    // 1. lib_url.txt を取得
    const response = await fetch('/MCJE/lib_url.txt');
    const text = await response.text();

    // 2. 改行をセミコロンに置換し、URLベースを /app/MCJE/lib/ に置換
    // ※ ここで変換ルールを適用する
    const classpath = text
      .split('\n')
      .filter(line => line.trim() !== "") // 空行を除去
      .map(line => {
          // ベースURLを削って /app/MCJE/lib/ に変換
          const filename = line.split('/').pop();
          return "/app/MCJE/lib/" + filename;
      })
      .join(':'); // CheerpJの区切り文字はコロン(:)

    // 3. メインのJARも連結
    const finalClasspath = "/app/MCJE/release/26.2.jar:" + classpath;

    console.log("生成されたクラスパス:", finalClasspath);

    // 4. 実行
    await cheerpjRunMain(
      "net.minecraft.client.main.Main",
      finalClasspath,
      "--username", "PLAYER_NAME",
      "--version", "26.2",
      "--gameDir", "/app/MCJE/Minecraft",
      "--assetsDir", "/app/MCJE/assets/",
      "--assetIndex", "26.2"
    );
  })();
</script>
