<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>Minecraft WE - 実行拠点</title>
    <script src="https://cjrtnc.leaningtech.com/4.3/loader.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game-container"></div>
<script>
  (async function () {
    await cheerpjInit();
    cheerpjCreateDisplay(800, 600);

    // 君のコマンドから読み取ったクラスパス
    // /app/ を忘れずに付ける
    const classpath = "/app/MCJE/release/26.2.jar:/app/MCJE/Minecraft/versions/26.2/26.2.json:/app/MCJE/lib/*";
    const mainClass = "net.minecraft.client.main.Main";

    // コマンドライン引数を配列で渡す
    const args = [
        "--username", "PLAYER_NAME",
        "--version", "26.2",
        "--gameDir", "/app/Minecraft",
        "--assetsDir", "/app/assets/",
        "--assetIndex", "26.2",
        "--uuid", "efb786c1-23d4-44e9-a732-b460c0983db5",
        "--accessToken", "accessToken11"
    ];

    console.log("マイクラをフルスペックで起動中...");
    
    // クラスパスと引数を指定して実行
    await cheerpjRunMain(mainClass, classpath, ...args);
  })();
</script>
