name: MineCraft JavaEdition Setup (To Releases)

on:
  workflow_dispatch: # ボタン一発で手動起動！

permissions:
  contents: write # リリースを作成・編集するために必須！

jobs:
  sync-to-releases:
    runs-on: ubuntu-latest

    steps:
      - name: 1. リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 2. Minecraft公式サーバーからマニフェストを救出
        run: |
          curl -s https://launchermeta.mojang.com/mc/game/version_manifest.json -o "MCJE_version_manifest_raw.json"
          jq . MCJE_version_manifest_raw.json > MCJE_version_manifest.json

      - name: 3. 未作成のバージョンを検知してReleasesへ自動投稿！
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_LIST=$(jq -r '.versions[0:20][] | .id' MCJE_version_manifest.json)
          
          # エラー防止用の || echo "" 付き
          EXISTING_RELEASES=$(gh release list --limit 100 2>/dev/null | awk '{print $1}' || echo "")
          
          for VERSION in $VERSION_LIST; do
            TAG_NAME="v$VERSION"
            
            # すでに存在すればスキップ
            if [ -n "$EXISTING_RELEASES" ] && echo "$EXISTING_RELEASES" | grep -q "^$TAG_NAME$"; then
              echo "[-] $TAG_NAME は既にリリース済みのためスキップします。"
              continue
            fi
            
            echo "[+] 新着バージョンを発見: $TAG_NAME の処理を開始します"

            DETAILS_URL=$(jq -r --arg ver "$VERSION" '.versions[] | select(.id == $ver) | .url' MCJE_version_manifest.json)
            curl -s "$DETAILS_URL" -o details.json
            
            JAR_URL=$(jq -r '.downloads.client.url' details.json)
            TYPE=$(jq -r '.type' details.json)
            
            if [ "$JAR_URL" == "null" ] || [ -z "$JAR_URL" ]; then
              echo "    [!] JARのダウンロードURLが見つからないためスキップします。"
              continue
            fi
            
            # 【★変更】保存するファイル名をバージョン名に変更（リトライ付き）
            echo "    [DL] $JAR_URL から $VERSION.jar としてダウンロード中..."
            curl --connect-timeout 10 --retry 3 --retry-delay 5 -L "$JAR_URL" -o "$VERSION.jar"
            
            # 【★変更】リリースに添付するファイル名も $VERSION.jar に変更！
            echo "    [Release] GitHubにリリースを作成して $VERSION.jar をアップロード中..."
            gh release create "$TAG_NAME" "$VERSION.jar" \
              --title "Minecraft $VERSION ($TYPE)" \
              --notes "Minecraft $TYPE バージョン $VERSION の自動バックアップです。" \
              --clobber
              
            # 後片付け（次のループのために今回のjarを削除してディスクを空ける）
            rm "$VERSION.jar"
            
            sleep 2
          done


      - name: 4. マニフェストだけメインリポジトリへ自動コミット＆プッシュ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action [Bot]"
          
          # JARはリリースに逃がしたので、JSONファイルだけをGitに記録
          git add MCJE_version_manifest.json
          
          if ! git diff --cached --quiet; then
            git commit -m "VALUE_CHANGE: マニフェストファイルの更新 [skip ci]"
            git push origin main
          else
            echo "マニフェストに変更はありません。"
          fi
