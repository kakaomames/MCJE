name: MineCraft JavaEdition python

on:
  workflow_dispatch: # ボタン一発で手動起動！

permissions:
  contents: write # リポジトリへの書き込み権限をフル解放！

jobs:
  sync-wasm:
    runs-on: ubuntu-latest

    steps:
      - name: 1. リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 2. py実行
        run: |
          mkdir -p Minecraft && cd Minecraft && mkdir -p versions && cd versions && mkdir -p 26.2 && cd ../../
          curl "https://piston-meta.mojang.com/v1/packages/4c3cd3500ce8b9ea104c358a784634fedb2a610f/26.2.json" -o "./Minecraft/versions/26.2/26.2.json"
          python java.py
          java -Xmx2G -cp "release/26.2.jar:Minecraft/versions/26.2/26.2.json:lib/*" "net.minecraft.client.main.Main" --username "PLAYER_NAME" --version 26.2 --gameDir "Minecraft" --assetsDir "assets/" --assetIndex 26.2 --uuid "efb786c1-23d4-44e9-a732-b460c0983db5" --accessToken "accessToken11"
          
      - name: 6. メインリポジトリへ自動コミット＆プッシュ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action [Bot]"
          git add .
          
          if ! git diff --cached --quiet; then
            git commit -m "VALUE_CHANGE: GitHub ActionによりMinecraft公式サーバーからリソースを自動摘出 [skip ci]"
            git push origin main
          else
            echo "変更がありません。処理をスキップします。"
          fi
